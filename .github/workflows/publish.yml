name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack Moss.Sdk/Moss.Sdk.csproj -c Release -p:Version=${{ inputs.version }} -o artifacts

      - name: Get OIDC token for NuGet Trusted Publishing
        run: |
          $token = Invoke-RestMethod -Headers @{Authorization="Bearer $env:ACTIONS_ID_TOKEN_REQUEST_TOKEN"} -Uri "${env:ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.nuget.org" -Method Get
          Set-Content -Path "$env:GITHUB_WORKSPACE/nuget-oidc-token.txt" -Value $token.value -NoNewline

      - name: Publish to NuGet (Trusted Publishing OIDC)
        run: |
          $oidcToken = Get-Content "$env:GITHUB_WORKSPACE/nuget-oidc-token.txt" -Raw
          $nupkg = Get-ChildItem -Path artifacts -Filter *.nupkg | Select-Object -First 1
          dotnet nuget push $nupkg.FullName --source https://api.nuget.org/v3/index.json --api-key $oidcToken
